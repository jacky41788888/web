<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主動式 ETF 雲端即時動態儀表板</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.5s ease-out forwards;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans selection:bg-indigo-500 selection:text-white">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function App() {
      const [activeTab, setActiveTab] = useState('cloud');
      
      // 已成功更新為 Google 官方直接發布的 CSV 端點
      const [driveUrl, setDriveUrl] = useState('https://docs.google.com/spreadsheets/d/e/2PACX-1vSoEPmzQQPSf6WIfkASsEPdKkJvO2mVC250oDxt9-4Bis4T7cbNm90UTctKxKYuXx8k2pvdjkEE8zWY/pub?output=csv');
      const [portfolioUrl, setPortfolioUrl] = useState('https://docs.google.com/spreadsheets/d/e/2PACX-1vTYQaaQn2mJmWYp5xvYr5UUSsn4kNw3XmX03b0UniE6bNKtOAyixLoQ_C9e9Ki5wy1FSxjpv5HiNSUK/pub?output=csv');
      
      const [rawText, setRawText] = useState('');
      const [selectedEtf, setSelectedEtf] = useState('');
      const [selectedDayDetail, setSelectedDayDetail] = useState('');
      const [loadedData, setLoadedData] = useState({});
      const [loadedPortfolioData, setLoadedPortfolioData] = useState({});
      const [syncStatus, setSyncStatus] = useState('idle');
      const [errorMessage, setErrorMessage] = useState('');
      const [showHowToPublish, setShowHowToPublish] = useState(false);

      // ==================== CSV 解析引擎 ====================
      const parseCsvToData = (text) => {
        try {
          if (!text || text.trim() === '') return {};
          
          // 安全防禦：如果拿到的文字包含錯誤 JSON 提示，拒絕解析以防黑屏
          if (text.includes('"error"') || text.includes('Free usage is limited')) {
            throw new Error('CORS 代理拒絕連線，請確認已轉為官方直接發布端點');
          }

          const lines = text.split(/\r?\n/);
          if (lines.length < 2) throw new Error('CSV 資料行數不足，無法分析');
          
          const headers = lines[0].split(',').map(h => h.trim().replace(/^["']|["']$/g, ''));
          
          const dateIdx = headers.findIndex(h => h.includes('日期') || h.toLowerCase().includes('date'));
          const itemIdx = headers.findIndex(h => h.includes('項目') || h.toLowerCase().includes('item'));
          const valueIdx = headers.findIndex(h => h.includes('數值') || h.toLowerCase().includes('value'));
          const etfIdx = headers.findIndex(h => h.includes('ETF類別') || h.includes('類別') || h.includes('代號') || h.toLowerCase().includes('etf'));

          if (dateIdx === -1 || itemIdx === -1 || valueIdx === -1) {
            throw new Error('CSV 格式欄位定位失敗，必須包含「資料日期」、「項目」、「數值」。');
          }

          const tempMap = {};

          for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            
            const cells = line.split(',').map(c => c.trim().replace(/^["']|["']$/g, ''));
            if (cells.length < 3) continue;

            const date = cells[dateIdx];
            const item = cells[itemIdx];
            const cleanValStr = cells[valueIdx].replace(/,/g, '');
            const value = parseFloat(cleanValStr || '0');
            const etf = etfIdx !== -1 ? cells[etfIdx] : '00981A';

            if (!date || !item || isNaN(value)) continue;

            if (!tempMap[etf]) tempMap[etf] = {};
            if (!tempMap[etf][date]) tempMap[etf][date] = {};

            tempMap[etf][date][item] = value;
          }

          const resultData = {};
          Object.keys(tempMap).forEach(etf => {
            const dates = Object.keys(tempMap[etf]).sort((a, b) => new Date(b) - new Date(a));
            
            resultData[etf] = dates.map((date) => {
              const items = tempMap[etf][date];
              const cash = items['現金'] || 0;
              const receivable = items['應收付證券款'] || 0;
              const redemption = items['申贖應付款'] || 0;
              const netAsset = items['淨資產'] || 0;
              const units = items['流通在外單位數'] || 0;
              const nav = items['每單位淨值'] || 0;

              const actualCashVal = cash + receivable + redemption;
              const actualCash100M = actualCashVal / 100000000;
              const cashRatio = netAsset > 0 ? (actualCashVal / netAsset) * 100 : 0;

              return { date, cash, receivable, redemption, netAsset, units, nav, actualCash100M, cashRatio, rawActualCash: actualCashVal };
            });

            const etfList = resultData[etf];
            for (let i = 0; i < etfList.length; i++) {
              const current = etfList[i];
              const prev = etfList[i + 1];

              if (prev) {
                current.cashChange = current.actualCash100M - prev.actualCash100M;
                const currUnits100M = current.units / 100000000;
                const prevUnits100M = prev.units / 100000000;
                current.unitsChange100M = currUnits100M - prevUnits100M;
                current.unitsChangeRatio = prevUnits100M > 0 ? (current.unitsChange100M / prevUnits100M) * 100 : 0;
                current.estCashFlow100M = (current.unitsChange100M * 100000000 * current.nav) / 100000000;
              } else {
                current.cashChange = 0; current.unitsChange100M = 0; current.unitsChangeRatio = 0; current.estCashFlow100M = 0;
              }
            }
          });

          return resultData;
        } catch (e) {
          throw new Error(`解析 CSV 發生錯誤：${e.message}`);
        }
      };

      // ==================== 持股明細解析引擎 ====================
      const parsePortfolioCsv = (text) => {
        try {
          if (!text || text.trim() === '') return {};
          if (text.includes('"error"') || text.includes('Free usage is limited')) return {};

          const lines = text.split(/\r?\n/);
          if (lines.length < 2) return {};
          
          const headers = lines[0].split(',').map(h => h.trim().replace(/^["']|["']$/g, ''));
          const dateIdx = headers.findIndex(h => h.includes('日期') || h.toLowerCase().includes('date'));
          const codeIdx = headers.findIndex(h => h.includes('股票代號') || h.includes('代碼'));
          const nameIdx = headers.findIndex(h => h.includes('名稱'));
          const sharesIdx = headers.findIndex(h => h.includes('股數'));
          const weightIdx = headers.findIndex(h => h.includes('權重'));
          const etfIdx = headers.findIndex(h => h.includes('ETF') || h.includes('類別'));

          const tempMap = {};
          for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            const cells = line.split(',').map(c => c.trim().replace(/^["']|["']$/g, ''));
            if (cells.length < 4) continue;
            
            const etf = etfIdx !== -1 ? cells[etfIdx] : '00981A';
            const date = cells[dateIdx];
            const code = cells[codeIdx];
            const name = cells[nameIdx];
            const shares = parseFloat(cells[sharesIdx] || '0');
            const weight = weightIdx !== -1 ? parseFloat(cells[weightIdx] || '0') : 0;
            
            if (!date || !code || isNaN(shares)) continue;
            
            if(!tempMap[etf]) tempMap[etf] = {};
            if(!tempMap[etf][date]) tempMap[etf][date] = {};
            tempMap[etf][date][code] = { code, name, shares, weight };
          }
          return tempMap;
        } catch (e) {
          console.warn(`明細 CSV 解析錯誤：${e.message}`);
          return {};
        }
      };

      // ==================== 官方 CSV 直接抓取處理 ====================
      const fetchSingleCsv = async (targetUrl) => {
        let directUrl = targetUrl;
        
        // 自動轉換 pubhtml 格式為正確的 CSV 直接讀取通道
        if (targetUrl.includes('/pubhtml')) {
          directUrl = targetUrl.replace('/pubhtml', '/pub?output=csv');
        }

        try {
          // 直接連線 Google 官方 CSV，不再繞道 corsproxy.io
          const response = await fetch(directUrl);
          if (!response.ok) throw new Error('Google 伺服器回傳連線異常');
          
          const text = await response.text();
          if (text.includes('<!DOCTYPE html>') || text.includes('Sign in - Google Accounts')) {
            throw new Error('未成功取得 CSV，請確認試算表「發布到網路」設定是否正確。');
          }
          return text;
        } catch (err) {
          // 若直接獲取失敗，嘗試開源備用代理站點繞過
          console.warn('官方直接連線受阻，啟動開源備用節點安全穿透...');
          const backupProxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(directUrl)}`;
          const res = await fetch(backupProxy);
          if (res.ok) {
            const backupText = await res.text();
            if (backupText && !backupText.includes('<!DOCTYPE html>')) return backupText;
          }
          throw err;
        }
      };

      const processLoadedData = (parsed) => {
        const etfKeys = Object.keys(parsed);
        if (etfKeys.length === 0) throw new Error('試算表中未含有任何有效欄位資料');
        setLoadedData(parsed);
        setSyncStatus('success');
        const defaultEtf = etfKeys[0];
        setSelectedEtf(defaultEtf);
        if (parsed[defaultEtf]?.[0]) setSelectedDayDetail(parsed[defaultEtf][0].date);
      };

      const clearDataOnError = () => {
        setLoadedData({});
        setLoadedPortfolioData({});
        setSelectedEtf('');
        setSelectedDayDetail('');
      };

      const fetchCsvFromDrive = async (summaryUrl, portfolioUrlStr) => {
        setSyncStatus('loading');
        setErrorMessage('');

        try {
          const summaryText = await fetchSingleCsv(summaryUrl);
          const parsedSummary = parseCsvToData(summaryText);

          let parsedPortfolio = {};
          if (portfolioUrlStr && portfolioUrlStr.trim() !== '') {
            try {
              const portfolioText = await fetchSingleCsv(portfolioUrlStr);
              parsedPortfolio = parsePortfolioCsv(portfolioText);
            } catch (pErr) {
              console.warn("持股明細抓取失敗，但仍會顯示資產總表", pErr);
            }
          }

          setLoadedPortfolioData(parsedPortfolio);
          processLoadedData(parsedSummary);
        } catch (err) {
          setSyncStatus('error');
          setErrorMessage(err.message);
          clearDataOnError();
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setSyncStatus('loading');
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const text = event.target.result;
            const parsed = parseCsvToData(text);
            processLoadedData(parsed);
            setErrorMessage('');
          } catch (err) {
            setSyncStatus('error');
            setErrorMessage(err.message);
            clearDataOnError();
          }
        };
        reader.readAsText(file);
      };

      const handleRawTextParse = () => {
        if (!rawText.trim()) return;
        setSyncStatus('loading');
        try {
          const parsed = parseCsvToData(rawText);
          processLoadedData(parsed);
          setErrorMessage('');
        } catch (err) {
          setSyncStatus('error');
          setErrorMessage(err.message);
          clearDataOnError();
        }
      };

      useEffect(() => {
        fetchCsvFromDrive(driveUrl, portfolioUrl);
      }, []);

      const activeDataset = useMemo(() => loadedData[selectedEtf] || [], [loadedData, selectedEtf]);
      const latestFiveDays = useMemo(() => activeDataset.slice(0, 5), [activeDataset]);
      const selectedDayData = useMemo(() => activeDataset.find(d => d.date === selectedDayDetail) || activeDataset[0] || null, [activeDataset, selectedDayDetail]);

      const portfolioChanges = useMemo(() => {
        if (!loadedPortfolioData[selectedEtf]) return { additions: [], reductions: [], newPositions: [] };
        const dates = Object.keys(loadedPortfolioData[selectedEtf]).sort((a, b) => new Date(b) - new Date(a));
        const currIdx = dates.indexOf(selectedDayDetail);
        
        if (currIdx === -1 || currIdx === dates.length - 1) return { additions: [], reductions: [], newPositions: [] };

        const currHoldings = loadedPortfolioData[selectedEtf][dates[currIdx]];
        const prevHoldings = loadedPortfolioData[selectedEtf][dates[currIdx + 1]];

        const additions = [];
        const reductions = [];
        const newPositions = [];

        for (const code in currHoldings) {
          const curr = currHoldings[code];
          const prev = prevHoldings[code];
          
          if (!prev || prev.shares === 0) {
            if (curr.shares > 0) newPositions.push({ ...curr, diff: curr.shares });
          } else if (curr.shares > prev.shares) {
            additions.push({ ...curr, diff: curr.shares - prev.shares });
          } else if (curr.shares < prev.shares) {
            reductions.push({ ...curr, diff: curr.shares - prev.shares, isCleared: curr.shares === 0 });
          }
        }

        for (const code in prevHoldings) {
          if (!currHoldings[code] && prevHoldings[code].shares > 0) {
            reductions.push({ ...prevHoldings[code], shares: 0, diff: -prevHoldings[code].shares, isCleared: true });
          }
        }

        additions.sort((a, b) => b.diff - a.diff);
        reductions.sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff));
        newPositions.sort((a, b) => b.diff - a.diff);

        return { additions, reductions, newPositions };
      }, [loadedPortfolioData, selectedEtf, selectedDayDetail]);

      const cashTacticsInterpretation = (dayData) => {
        if (!dayData) return { title: '無數據', text: '暫無數據可供分析。', color: 'bg-slate-800' };
        const change = dayData.cashChange;
        const isPreSpending = dayData.receivable < 0 && Math.abs(dayData.receivable) > dayData.cash;

        if (isPreSpending) return { title: '領錢進攻 ＆ 預支佈局 🚀', text: `今日實際「應收付證券交割款」高達 -${(Math.abs(dayData.receivable)/100000000).toFixed(2)} 億，已超出帳面現金庫存。這代表經理人利用 T+2 交割時差提前「預支」資金買進潛力股。目前處於火力全開的絕對進攻狀態！`, color: 'text-rose-400 bg-rose-500/10 border-rose-500/20' };
        if (change < 0) return { title: '領錢進攻（大舉入市） 🔥', text: `今日實際可用剩餘現金減少 ${Math.abs(change).toFixed(2)} 億。這代表經理人此時正將累積下來的防禦銀彈大舉提領並換成股票持股，操作取態積極強勢！`, color: 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20' };
        return { title: '存錢防禦（累積彈藥） 🛡️', text: `今日實際剩餘可用金增加 ${change.toFixed(2)} 億。主要反映經理人適度主動賣股變現以調節風險；或為當日湧入大筆新申購資金尚來不及布局股票，資金被動累積，為後續保留進攻底牌。`, color: 'text-cyan-400 bg-cyan-500/10 border-cyan-500/20' };
      };

      const marketSentimentInterpretation = (dayData) => {
        if (!dayData) return { text: '無數據', trend: '平穩' };
        const ratioChange = dayData.unitsChangeRatio;
        const estFlow = dayData.estCashFlow100M;

        if (ratioChange > 1.5) return { trend: '極度狂熱 📈', text: `流通在外受益單位單日暴增 ${(ratioChange).toFixed(2)}%，推估為基金帶進高達 +${estFlow.toFixed(2)} 億元的搶購狂潮。買盤流入速度正「瘋狂變快」！` };
        if (ratioChange > 0.05) return { trend: '買氣暢旺 👍', text: `大眾申購穩定遞增，流通單位數成長 ${(ratioChange).toFixed(2)}%，挹注新資金約 +${estFlow.toFixed(2)} 億。進場追價速度「穩定加溫」。` };
        if (ratioChange < -0.05) return { trend: '獲利贖回 💰', text: `流通在外單位減少 ${Math.abs(ratioChange).toFixed(2)}%，估計流出金額約 ${Math.abs(estFlow).toFixed(2)} 億。買進速度「正在放慢」，大眾多選擇逢高了結、落袋為安。` };
        return { trend: '靜待變盤 ⚖️', text: `流通單位變動平緩 (${(ratioChange).toFixed(3)}%)。市場目前正處於觀望階段，多空情緒暫時平穩沉澱。` };
      };

      // ==================== 繪圖元件 ====================
      const ChronologicalCashChart = () => {
        const chronologicalDays = useMemo(() => [...latestFiveDays].reverse(), [latestFiveDays]);
        const [hoveredIdx, setHoveredIdx] = useState(null);
        if (chronologicalDays.length === 0) return null;

        const cashValues = chronologicalDays.map(d => d.actualCash100M);
        const maxCash = Math.max(...cashValues, 0.1) * 1.15;
        const minCash = Math.min(...cashValues, 0) < 0 ? Math.min(...cashValues) * 1.15 : 0;
        
        const svgW = 600; const svgH = 180;
        const pad = { top: 15, right: 30, bottom: 30 ... }; // 保持內部圖表渲染不變
