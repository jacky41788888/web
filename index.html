<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主動式 ETF 雲端即時動態儀表板</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.5s ease-out forwards;
    }
    body {
      background-color: rgb(15, 23, 42);
      color: rgb(226, 232, 240);
    }
  </style>
</head>
<body class="font-sans selection:bg-indigo-500 selection:text-white">
  
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    const { useState, useEffect, useMemo } = React;

    function App() {
      const [activeTab, setActiveTab] = useState('cloud');
      const [driveUrl, setDriveUrl] = useState('https://docs.google.com/spreadsheets/d/e/2PACX-1vSoEPmzQQPSf6WIfkASsEPdKkJvO2mVC250oDxt9-4Bis4T7cbNm90UTctKxKYuXx8k2pvdjkEE8zWY/pub?output=csv');
      const [portfolioUrl, setPortfolioUrl] = useState('https://docs.google.com/spreadsheets/d/e/2PACX-1vTYQaaQn2mJmWYp5xvYr5UUSsn4kNw3XmX03b0UniE6bNKtOAyixLoQ_C9e9Ki5wy1FSxjpv5HiNSUK/pub?output=csv');
      
      const [rawText, setRawText] = useState('');
      const [selectedEtf, setSelectedEtf] = useState('');
      const [selectedDayDetail, setSelectedDayDetail] = useState('');
      const [loadedData, setLoadedData] = useState({});
      const [loadedPortfolioData, setLoadedPortfolioData] = useState({});
      const [syncStatus, setSyncStatus] = useState('idle');
      const [errorMessage, setErrorMessage] = useState('');

      // CSV 解析引擎
      const parseCsvToData = (text) => {
        try {
          if (!text || text.trim() === '') return {};
          
          if (text.includes('"error"') || text.includes('Free usage is limited')) {
            throw new Error('CORS 代理拒絕連線，請確認已轉為官方直接發布端點');
          }

          const lines = text.split(/\r?\n/);
          if (lines.length < 2) throw new Error('CSV 資料行數不足，無法分析');
          
          const headers = lines[0].split(',').map(h => h.trim().replace(/^["']|["']$/g, ''));
          
          const dateIdx = headers.findIndex(h => h.includes('日期') || h.toLowerCase().includes('date'));
          const itemIdx = headers.findIndex(h => h.includes('項目') || h.toLowerCase().includes('item'));
          const valueIdx = headers.findIndex(h => h.includes('數值') || h.toLowerCase().includes('value'));
          const etfIdx = headers.findIndex(h => h.includes('ETF類別') || h.includes('類別') || h.includes('代號') || h.toLowerCase().includes('etf'));

          if (dateIdx === -1 || itemIdx === -1 || valueIdx === -1) {
            throw new Error('CSV 格式欄位定位失敗，必須包含「資料日期」、「項目」、「數值」。');
          }

          const tempMap = {};

          for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            
            const cells = line.split(',').map(c => c.trim().replace(/^["']|["']$/g, ''));
            if (cells.length < 3) continue;

            const date = cells[dateIdx];
            const item = cells[itemIdx];
            const cleanValStr = cells[valueIdx].replace(/,/g, '');
            const value = parseFloat(cleanValStr || '0');
            const etf = etfIdx !== -1 ? cells[etfIdx] : '00981A';

            if (!date || !item || isNaN(value)) continue;

            if (!tempMap[etf]) tempMap[etf] = {};
            if (!tempMap[etf][date]) tempMap[etf][date] = {};

            tempMap[etf][date][item] = value;
          }

          const resultData = {};
          Object.keys(tempMap).forEach(etf => {
            const dates = Object.keys(tempMap[etf]).sort((a, b) => new Date(b) - new Date(a));
            
            resultData[etf] = dates.map((date) => {
              const items = tempMap[etf][date];
              const cash = items['現金'] || 0;
              const receivable = items['應收付證券款'] || 0;
              const redemption = items['申贖應付款'] || 0;
              const netAsset = items['淨資產'] || 0;
              const units = items['流通在外單位數'] || 0;
              const nav = items['每單位淨值'] || 0;

              const actualCashVal = cash + receivable + redemption;
              const actualCash100M = actualCashVal / 100000000;
              const cashRatio = netAsset > 0 ? (actualCashVal / netAsset) * 100 : 0;

              return { date, cash, receivable, redemption, netAsset, units, nav, actualCash100M, cashRatio, rawActualCash: actualCashVal };
            });

            const etfList = resultData[etf];
            for (let i = 0; i < etfList.length; i++) {
              const current = etfList[i];
              const prev = etfList[i + 1];

              if (prev) {
                current.cashChange = current.actualCash100M - prev.actualCash100M;
                const currUnits100M = current.units / 100000000;
                const prevUnits100M = prev.units / 100000000;
                current.unitsChange100M = currUnits100M - prevUnits100M;
                current.unitsChangeRatio = prevUnits100M > 0 ? (current.unitsChange100M / prevUnits100M) * 100 : 0;
                current.estCashFlow100M = (current.unitsChange100M * 100000000 * current.nav) / 100000000;
              } else {
                current.cashChange = 0; current.unitsChange100M = 0; current.unitsChangeRatio = 0; current.estCashFlow100M = 0;
              }
            }
          });

          return resultData;
        } catch (e) {
          setErrorMessage(e.message);
          return {};
        }
      };

      // 數據同步器
      const syncData = async () => {
        setSyncStatus('loading');
        setErrorMessage('');
        try {
          const response = await fetch(driveUrl);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const text = await response.text();
          const parsed = parseCsvToData(text);
          setLoadedData(parsed);
          setRawText(text);
          const firstEtf = Object.keys(parsed)[0];
          if (firstEtf) {
            setSelectedEtf(firstEtf);
            setSelectedDayDetail(parsed[firstEtf][0].date);
          }
          setSyncStatus('success');
        } catch (e) {
          setErrorMessage(e.message);
          setSyncStatus('error');
        }
      };

      const syncPortfolioData = async () => {
        setSyncStatus('loading');
        setErrorMessage('');
        try {
          const response = await fetch(portfolioUrl);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const text = await response.text();
          const parsed = parseCsvToData(text);
          setLoadedPortfolioData(parsed);
          setSyncStatus('success');
        } catch (e) {
          setErrorMessage(e.message);
          setSyncStatus('error');
        }
      };

      useEffect(() => {
        if (activeTab === 'cloud') syncData();
        else if (activeTab === 'portfolio') syncPortfolioData();
      }, [driveUrl, portfolioUrl, activeTab]);

      // 渲染邏輯
      const etfList = useMemo(() => Object.keys(loadedData), [loadedData]);
      const currentEtfData = useMemo(() => loadedData[selectedEtf] || [], [loadedData, selectedEtf]);
      const currentDayData = useMemo(() => currentEtfData.find(d => d.date === selectedDayDetail), [currentEtfData, selectedDayDetail]);

      return React.createElement('div', { className: 'min-h-screen p-4 md:p-6' },
        React.createElement('div', { className: 'max-w-7xl mx-auto' },
          // 標題
          React.createElement('div', { className: 'text-center mb-8' },
            React.createElement('h1', { className: 'text-3xl md:text-4xl font-bold mb-2 bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent' },
              '主動式 ETF 雲端即時動態儀表板'
            ),
            React.createElement('p', { className: 'text-slate-400' },
              '實時監控 ETF 現金流與投資組合動態'
            )
          ),

          // 錯誤訊息
          errorMessage && React.createElement('div', { className: 'mb-4 p-4 bg-red-900/20 border border-red-700 rounded-lg text-red-400' },
            React.createElement('i', { className: 'fas fa-exclamation-circle mr-2' }),
            errorMessage
          ),

          // 標籤頁
          React.createElement('div', { className: 'flex gap-2 mb-6 border-b border-slate-700' },
            ['cloud', 'portfolio', 'settings'].map(tab =>
              React.createElement('button', {
                key: tab,
                onClick: () => setActiveTab(tab),
                className: `px-4 py-2 font-medium transition-colors ${
                  activeTab === tab
                    ? 'text-indigo-400 border-b-2 border-indigo-400'
                    : 'text-slate-400 hover:text-slate-300'
                }`
              },
                tab === 'cloud' && '現金流監控',
                tab === 'portfolio' && '投資組合',
                tab === 'settings' && '設定'
              )
            )
          ),

          // 內容區域
          activeTab === 'cloud' && React.createElement('div', { className: 'grid md:grid-cols-4 gap-4' },
            // ETF 選擇器
            React.createElement('div', { className: 'md:col-span-1 bg-slate-900 rounded-lg p-4 border border-slate-800' },
              React.createElement('h3', { className: 'font-semibold mb-3 text-indigo-400' }, 'ETF 基金'),
              React.createElement('div', { className: 'space-y-2 max-h-96 overflow-y-auto' },
                etfList.length > 0
                  ? etfList.map(etf =>
                      React.createElement('button', {
                        key: etf,
                        onClick: () => {
                          setSelectedEtf(etf);
                          setSelectedDayDetail(loadedData[etf][0].date);
                        },
                        className: `w-full px-3 py-2 rounded text-sm transition-colors text-left ${
                          selectedEtf === etf
                            ? 'bg-indigo-600 text-white'
                            : 'bg-slate-800 text-slate-300 hover:bg-slate-700'
                        }`
                      },
                        etf
                      )
                    )
                  : React.createElement('p', { className: 'text-slate-500 text-sm' }, '載入中...')
              )
            ),

            // 主要顯示區
            React.createElement('div', { className: 'md:col-span-3 space-y-4' },
              // 日期選擇
              currentEtfData.length > 0 && React.createElement('div', { className: 'bg-slate-900 rounded-lg p-4 border border-slate-800' },
                React.createElement('h3', { className: 'font-semibold mb-3 text-indigo-400' }, '選擇日期'),
                React.createElement('div', { className: 'grid grid-cols-4 md:grid-cols-6 gap-2 max-h-24 overflow-y-auto' },
                  currentEtfData.map(d =>
                    React.createElement('button', {
                      key: d.date,
                      onClick: () => setSelectedDayDetail(d.date),
                      className: `px-2 py-1 rounded text-xs transition-colors ${
                        selectedDayDetail === d.date
                          ? 'bg-indigo-600 text-white'
                          : 'bg-slate-800 text-slate-300 hover:bg-slate-700'
                      }`
                    },
                      d.date
                    )
                  )
                )
              ),

              // 數據展示
              currentDayData && React.createElement('div', { className: 'grid md:grid-cols-2 gap-4' },
                React.createElement('div', { className: 'bg-slate-900 rounded-lg p-4 border border-slate-800' },
                  React.createElement('h4', { className: 'font-semibold text-indigo-400 mb-3' }, '現金狀況'),
                  React.createElement('div', { className: 'space-y-2 text-sm' },
                    React.createElement('div', { className: 'flex justify-between' },
                      React.createElement('span', { className: 'text-slate-400' }, '實際現金 (億):'),
                      React.createElement('span', { className: 'text-white font-semibold' }, currentDayData.actualCash100M.toFixed(2))
                    ),
                    React.createElement('div', { className: 'flex justify-between' },
                      React.createElement('span', { className: 'text-slate-400' }, '現金比例:'),
                      React.createElement('span', { className: 'text-white font-semibold' }, currentDayData.cashRatio.toFixed(2) + '%')
                    ),
                    React.createElement('div', { className: 'flex justify-between' },
                      React.createElement('span', { className: 'text-slate-400' }, '現金變化:'),
                      React.createElement('span', { className: currentDayData.cashChange >= 0 ? 'text-green-400' : 'text-red-400' },
                        (currentDayData.cashChange > 0 ? '+' : '') + currentDayData.cashChange.toFixed(2)
                      )
                    )
                  )
                ),

                React.createElement('div', { className: 'bg-slate-900 rounded-lg p-4 border border-slate-800' },
                  React.createElement('h4', { className: 'font-semibold text-indigo-400 mb-3' }, '基金資訊'),
                  React.createElement('div', { className: 'space-y-2 text-sm' },
                    React.createElement('div', { className: 'flex justify-between' },
                      React.createElement('span', { className: 'text-slate-400' }, '淨資產 (億):'),
                      React.createElement('span', { className: 'text-white font-semibold' }, (currentDayData.netAsset / 100000000).toFixed(2))
                    ),
                    React.createElement('div', { className: 'flex justify-between' },
                      React.createElement('span', { className: 'text-slate-400' }, '流通單位 (百萬):'),
                      React.createElement('span', { className: 'text-white font-semibold' }, (currentDayData.units / 1000000).toFixed(2))
                    ),
                    React.createElement('div', { className: 'flex justify-between' },
                      React.createElement('span', { className: 'text-slate-400' }, '淨值:'),
                      React.createElement('span', { className: 'text-white font-semibold' }, currentDayData.nav.toFixed(2))
                    )
                  )
                )
              )
            )
          ),

          activeTab === 'portfolio' && React.createElement('div', { className: 'bg-slate-900 rounded-lg p-6 border border-slate-800' },
            React.createElement('h2', { className: 'text-xl font-semibold mb-4 text-indigo-400' }, '投資組合資訊'),
            React.createElement('p', { className: 'text-slate-400' }, '投資組合數據將在此顯示...')
          ),

          activeTab === 'settings' && React.createElement('div', { className: 'space-y-4 max-w-2xl' },
            React.createElement('div', { className: 'bg-slate-900 rounded-lg p-6 border border-slate-800' },
              React.createElement('h3', { className: 'font-semibold mb-4 text-indigo-400' }, 'Google Sheets URL 設定'),
              React.createElement('div', { className: 'space-y-4' },
                React.createElement('div', {},
                  React.createElement('label', { className: 'block text-sm font-medium mb-2 text-slate-300' }, '現金流 Sheet URL'),
                  React.createElement('input', {
                    type: 'text',
                    value: driveUrl,
                    onChange: (e) => setDriveUrl(e.target.value),
                    className: 'w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded text-slate-100 text-sm focus:outline-none focus:border-indigo-500',
                    placeholder: 'https://docs.google.com/spreadsheets/...'
                  })
                ),

                React.createElement('div', {},
                  React.createElement('label', { className: 'block text-sm font-medium mb-2 text-slate-300' }, '投資組合 Sheet URL'),
                  React.createElement('input', {
                    type: 'text',
                    value: portfolioUrl,
                    onChange: (e) => setPortfolioUrl(e.target.value),
                    className: 'w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded text-slate-100 text-sm focus:outline-none focus:border-indigo-500',
                    placeholder: 'https://docs.google.com/spreadsheets/...'
                  })
                ),

                React.createElement('button', {
                  onClick: syncData,
                  disabled: syncStatus === 'loading',
                  className: 'w-full px-4 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-600 text-white rounded font-medium transition-colors'
                },
                  syncStatus === 'loading' ? '同步中...' : '立即同步'
                )
              )
            ),

            React.createElement('div', { className: 'bg-slate-900 rounded-lg p-6 border border-slate-800' },
              React.createElement('h3', { className: 'font-semibold mb-4 text-indigo-400' }, 'CSV 格式說明'),
              React.createElement('div', { className: 'text-sm text-slate-400 space-y-2' },
                React.createElement('p', {}, 'CSV 檔案必須包含以下欄位：'),
                React.createElement('ul', { className: 'list-disc list-inside space-y-1' },
                  React.createElement('li', {}, '資料日期 (Date)'),
                  React.createElement('li', {}, '項目 (Item)'),
                  React.createElement('li', {}, '數值 (Value)'),
                  React.createElement('li', {}, 'ETF類別 / 類別 / 代號 (ETF Category) - 可選')
                )
              )
            )
          )
        )
      );
    }

    // 掛載應用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
